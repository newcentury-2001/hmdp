server:
  port: 8081
spring:
  application:
    name: hmdp-plus
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      database: 0
      host: 127.0.0.1
      port: 6379
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    servlet:
      load-on-startup: 1    
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    generator:
      WRITE_NUMBERS_AS_STRINGS: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      #默认的消费组ID
      group-id: create_voucher_order
      #是否自动提交offset - 改为自动提交
      enable-auto-commit: true
      #提交offset延时
      auto-commit-interval: 200
      # 当kafka中没有初始offset或offset超出范围时将自动重置offset
      # earliest:重置为分区中最小的offset;
      # latest:重置为分区中最新的offset(消费分区中新产生的数据);
      # none:只要有一个分区不存在已提交的offset,就抛出异常;
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer  
mybatis-plus:
  type-aliases-package: org.javaup.entity # 别名扫描包
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    local-cache-scope: statement
logging:
  level:
    org.javaup: debug
    AUDIT: INFO
  pattern:
    dateformat: mm:ss.SSS
bloom-filter:
  filters:
    shop:
      name: shop-id-bloom
      expected-insertions: 50000
      false-probability: 0.01
    voucher:
      name: voucher-id-bloom
      expected-insertions: 100000
      false-probability: 0.01
seckill:
  cache:
    invalidate:
      retry:
        maxAttempts: 3
        initialBackoffMillis: 200
        maxBackoffMillis: 800
      dlq:
        replay:
          dedupWindowSeconds: 60
      topic:
        partitions: 3
        replicationFactor: 1
        dlq:
          partitions: 3
          replicationFactor: 1
  autoissue:
    notify:
      sms:
        enabled: false
        to: ""
      app:
        enabled: false
      dedup:
        window:
          seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    prometheus:
      enabled: true
      